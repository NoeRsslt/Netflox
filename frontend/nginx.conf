server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # App React (react-router) : toute route inconnue retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API backend
    location /api/ {
        proxy_pass http://netflox-backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Important pour le streaming vidéo (requêtes Range) : pas de mise en buffer
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Affiches des films (posters TMDB téléchargées par le backend)
    location /posters/ {
        proxy_pass http://netflox-backend:4000/posters/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
